name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan committed files for high-risk secret patterns
        shell: pwsh
        run: ./scripts/scan-secrets.ps1

  config-sync:
    name: Config sync
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify env example matches Spring config
        shell: pwsh
        run: ./scripts/verify-env-sync.ps1

  migration-discipline:
    name: DB migration discipline
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify migration naming and versions
        shell: pwsh
        run: ./scripts/verify-db-migrations.ps1

  observability-alerts:
    name: Observability alert rules
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify Prometheus alert rules are documented and loadable
        shell: pwsh
        run: ./scripts/verify-prometheus-alerts.ps1

  backup-rehearsal-runbook:
    name: Backup rehearsal runbook
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify backup restore rehearsal runbook
        shell: pwsh
        run: ./scripts/verify-backup-rehearsal-runbook.ps1
  admin-audit-contract:
    name: Admin audit contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify high-risk admin action audit contract
        shell: pwsh
        run: ./scripts/verify-admin-audit-contract.ps1
  privacy-control-contract:
    name: Privacy control contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify user privacy control contract
        shell: pwsh
        run: ./scripts/verify-privacy-control-contract.ps1
  media-processing-contract:
    name: Media processing contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify large media and thumbnail processing contract
        shell: pwsh
        run: ./scripts/verify-media-processing-contract.ps1
  file-upload-security-contract:
    name: File upload security contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify file upload security contract
        shell: pwsh
        run: ./scripts/verify-file-upload-security-contract.ps1
  pwa-mobile-baseline:
    name: PWA mobile baseline
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify PWA installability and API-cache safety baseline
        shell: pwsh
        run: ./scripts/verify-pwa-mobile-baseline.ps1
  ledger-ai-coach-contract:
    name: Ledger AI coach contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify advisory ledger AI coach contract
        shell: pwsh
        run: ./scripts/verify-ledger-ai-coach-contract.ps1
  ledger-classification-contract:
    name: Ledger classification contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify ledger classification contract
        shell: pwsh
        run: ./scripts/verify-ledger-classification-contract.ps1
  ledger-anomaly-contract:
    name: Ledger anomaly contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify ledger anomaly contract
        shell: pwsh
        run: ./scripts/verify-ledger-anomaly-contract.ps1
  travel-story-export-contract:
    name: Travel story export contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify travel story export contract
        shell: pwsh
        run: ./scripts/verify-travel-story-export-contract.ps1
  household-budget-goals-contract:
    name: Household budget goals contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify household budget and shared goals contract
        shell: pwsh
        run: ./scripts/verify-household-budget-goals-contract.ps1
  notification-center-contract:
    name: Notification center contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify notification center contract
        shell: pwsh
        run: ./scripts/verify-notification-center-contract.ps1
  data-portability-contract:
    name: Data portability contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify data portability contract
        shell: pwsh
        run: ./scripts/verify-data-portability-contract.ps1
  service-decomposition-plan:
    name: Service decomposition plan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify service decomposition plan stays current
        shell: pwsh
        run: ./scripts/verify-service-decomposition-plan.ps1
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - name: Run tests
        run: |
          chmod +x ./gradlew
          ./gradlew test --no-daemon

  backend-security-tests:
    name: Backend security-focused tests
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - name: Run security-focused tests
        run: |
          chmod +x ./gradlew
          ./gradlew test --no-daemon \
            --tests com.playdata.calen.account.AdminDashboardIntegrationTest \
            --tests com.playdata.calen.account.ProfileCredentialIntegrationTest \
            --tests com.playdata.calen.account.PrivacyControllerIntegrationTest \
            --tests com.playdata.calen.drive.web.DriveAdminSecurityIntegrationTest \
            --tests com.playdata.calen.drive.service.DriveDownloadLinkServiceTest \
            --tests com.playdata.calen.drive.service.DriveDownloadLinkAccessLogServiceTest \
            --tests com.playdata.calen.travel.service.TravelPublicMediaTokenServiceTest \
            --tests com.playdata.calen.ledger.ocr.LedgerOcrServiceTest \
            --tests com.playdata.calen.ledger.ai.LedgerAiRemoteResponseValidatorTest \
            --tests com.playdata.calen.ledger.ai.LedgerAiAnalysisServiceTest

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build

  frontend-e2e-smoke-checklist:
    name: Frontend E2E smoke checklist
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify frontend E2E smoke checklist
        shell: pwsh
        run: ./scripts/verify-e2e-smoke-checklist.ps1
  release-gate:
    name: Release gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - secret-scan
      - config-sync
      - migration-discipline
      - observability-alerts
      - backup-rehearsal-runbook
      - admin-audit-contract
      - privacy-control-contract
      - media-processing-contract
      - file-upload-security-contract
      - ledger-ai-coach-contract
      - ledger-classification-contract
      - ledger-anomaly-contract
      - travel-story-export-contract
      - household-budget-goals-contract
      - notification-center-contract
      - data-portability-contract
      - pwa-mobile-baseline
      - service-decomposition-plan
      - backend-test
      - backend-security-tests
      - frontend-build
      - frontend-e2e-smoke-checklist
    if: always()
    steps:
      - name: Verify required CI checks
        shell: bash
        run: |
          declare -A results=(
            [secret-scan]="${{ needs['secret-scan'].result }}"
            [config-sync]="${{ needs['config-sync'].result }}"
            [migration-discipline]="${{ needs['migration-discipline'].result }}"
            [observability-alerts]="${{ needs['observability-alerts'].result }}"
            [backup-rehearsal-runbook]="${{ needs['backup-rehearsal-runbook'].result }}"
            [admin-audit-contract]="${{ needs['admin-audit-contract'].result }}"
            [privacy-control-contract]="${{ needs['privacy-control-contract'].result }}"
            [media-processing-contract]="${{ needs['media-processing-contract'].result }}"
            [file-upload-security-contract]="${{ needs['file-upload-security-contract'].result }}"
            [ledger-ai-coach-contract]="${{ needs['ledger-ai-coach-contract'].result }}"
            [ledger-classification-contract]="${{ needs['ledger-classification-contract'].result }}"
            [ledger-anomaly-contract]="${{ needs['ledger-anomaly-contract'].result }}"
            [travel-story-export-contract]="${{ needs['travel-story-export-contract'].result }}"
            [household-budget-goals-contract]="${{ needs['household-budget-goals-contract'].result }}"
            [notification-center-contract]="${{ needs['notification-center-contract'].result }}"
            [data-portability-contract]="${{ needs['data-portability-contract'].result }}"
            [pwa-mobile-baseline]="${{ needs['pwa-mobile-baseline'].result }}"
            [service-decomposition-plan]="${{ needs['service-decomposition-plan'].result }}"
            [backend-test]="${{ needs['backend-test'].result }}"
            [backend-security-tests]="${{ needs['backend-security-tests'].result }}"
            [frontend-build]="${{ needs['frontend-build'].result }}"
            [frontend-e2e-smoke-checklist]="${{ needs['frontend-e2e-smoke-checklist'].result }}"
          )

          failed=0
          for check in "${!results[@]}"; do
            echo "$check: ${results[$check]}"
            if [ "${results[$check]}" != "success" ]; then
              echo "::error::$check did not pass"
              failed=1
            fi
          done

          if [ "$failed" -ne 0 ]; then
            exit 1
          fi