name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan committed files for high-risk secret patterns
        shell: pwsh
        run: ./scripts/scan-secrets.ps1

  config-sync:
    name: Config sync
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify env example matches Spring config
        shell: pwsh
        run: ./scripts/verify-env-sync.ps1

  migration-discipline:
    name: DB migration discipline
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify migration naming and versions
        shell: pwsh
        run: ./scripts/verify-db-migrations.ps1

  observability-alerts:
    name: Observability alert rules
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify Prometheus alert rules are documented and loadable
        shell: pwsh
        run: ./scripts/verify-prometheus-alerts.ps1

  backup-rehearsal-runbook:
    name: Backup rehearsal runbook
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify backup restore rehearsal runbook
        shell: pwsh
        run: ./scripts/verify-backup-rehearsal-runbook.ps1
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - name: Run tests
        run: |
          chmod +x ./gradlew
          ./gradlew test --no-daemon

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build

  release-gate:
    name: Release gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - secret-scan
      - config-sync
      - migration-discipline
      - observability-alerts
      - backup-rehearsal-runbook
      - backend-test
      - frontend-build
    if: always()
    steps:
      - name: Verify required CI checks
        shell: bash
        run: |
          declare -A results=(
            [secret-scan]="${{ needs.secret-scan.result }}"
            [config-sync]="${{ needs.config-sync.result }}"
            [migration-discipline]="${{ needs.migration-discipline.result }}"
            [observability-alerts]="${{ needs.observability-alerts.result }}"
            [backup-rehearsal-runbook]="${{ needs.backup-rehearsal-runbook.result }}"
            [backend-test]="${{ needs.backend-test.result }}"
            [frontend-build]="${{ needs.frontend-build.result }}"
          )

          failed=0
          for check in "${!results[@]}"; do
            echo "$check: ${results[$check]}"
            if [ "${results[$check]}" != "success" ]; then
              echo "::error::$check did not pass"
              failed=1
            fi
          done

          if [ "$failed" -ne 0 ]; then
            exit 1
          fi