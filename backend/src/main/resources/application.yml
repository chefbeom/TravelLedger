spring:
  application:
    name: calen-backend
  datasource:
    url: ${DB_URL:jdbc:h2:mem:calen;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    driver-class-name: ${DB_SERVER:org.h2.Driver}
    username: ${DB_ID:sa}
    password: ${DB_PASS:}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:false}
      path: /h2-console
  jackson:
    time-zone: Asia/Seoul
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 40MB

minio:
  endpoint: ${MINIO_API:}
  access-key: ${MINIO_NAME:}
  secret-key: ${MINIO_SECRET:}
  bucket_cloud: ${MINIO_CLOUD_BUCKET:budgetjourneybucket}
  bucket_work: ${MINIO_WORKSPACE_BUCKET:}
  presigned-url-expiry-seconds: ${MINIO_PRESIGNED_URL_EXPIRY_SECONDS:6000}

server:
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

app:
  security:
    remember-me-key: ${JWT_KEY:calen-remember-me-key}
    remember-me-token-validity-seconds: 2592000
  jwt:
    key: ${JWT_KEY:}
    expire: ${JWT_EXPIRE:300000000}
  travel:
    exchange-rate-base-url: ${TRAVEL_EXCHANGE_RATE_BASE_URL:https://api.frankfurter.dev/v1}
    exchange-rate-cache-minutes: ${TRAVEL_EXCHANGE_RATE_CACHE_MINUTES:30}
    media-storage-path: ${TRAVEL_MEDIA_STORAGE_PATH:${user.dir}/uploads/travel-media}
    media-object-prefix: ${TRAVEL_MEDIA_OBJECT_PREFIX:travel-media}
  family:
    media-storage-path: ${FAMILY_MEDIA_STORAGE_PATH:${user.dir}/uploads/family-media}
    media-object-prefix: ${FAMILY_MEDIA_OBJECT_PREFIX:family-media}
  seed:
    enabled: ${APP_SEED_ENABLED:false}
