spring:
  application:
    name: calen-backend
  datasource:
    url: ${DB_URL:jdbc:h2:mem:calen;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    driver-class-name: ${DB_DRIVER:${DB_SERVER:org.h2.Driver}}
    username: ${DB_ID:sa}
    password: ${DB_PASS:}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: ${JPA_FORMAT_SQL:false}
  flyway:
    enabled: ${DB_MIGRATION_ENABLED:false}
    locations: classpath:db/migration
    baseline-on-migrate: ${DB_MIGRATION_BASELINE_ON_MIGRATE:true}
    baseline-version: ${DB_MIGRATION_BASELINE_VERSION:0}
    validate-on-migrate: ${DB_MIGRATION_VALIDATE_ON_MIGRATE:true}
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:false}
      path: /h2-console
  jackson:
    time-zone: Asia/Seoul
  servlet:
    multipart:
      max-file-size: 1GB
      max-request-size: 1GB

minio:
  endpoint: ${MINIO_API:}
  public-endpoint: ${MINIO_PUBLIC_API:}
  access-key: ${MINIO_NAME:}
  secret-key: ${MINIO_SECRET:}
  bucket_cloud: ${MINIO_CLOUD_BUCKET:budgetjourneybucket}
  bucket_work: ${MINIO_WORKSPACE_BUCKET:}
  presigned-url-expiry-seconds: ${MINIO_PRESIGNED_URL_EXPIRY_SECONDS:6000}
  storage-capacity-bytes: ${MINIO_STORAGE_CAPACITY_BYTES:0}

server:
  forward-headers-strategy: framework
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

app:
  security:
    remember-me-key: ${JWT_KEY:calen-remember-me-key}
    remember-me-token-validity-seconds: 2592000
  jwt:
    key: ${JWT_KEY:}
    expire: ${JWT_EXPIRE:300000000}
  travel:
    exchange-rate-base-url: ${TRAVEL_EXCHANGE_RATE_BASE_URL:https://api.frankfurter.dev/v1}
    exchange-rate-cache-minutes: ${TRAVEL_EXCHANGE_RATE_CACHE_MINUTES:30}
    reverse-geocode-base-url: ${TRAVEL_REVERSE_GEOCODE_BASE_URL:https://nominatim.openstreetmap.org/reverse}
    reverse-geocode-user-agent: ${TRAVEL_REVERSE_GEOCODE_USER_AGENT:TravelLedger/1.0 (+https://www.innoutdrive.space)}
    reverse-geocode-request-min-interval-ms: ${TRAVEL_REVERSE_GEOCODE_REQUEST_MIN_INTERVAL_MS:1200}
    reverse-geocode-cache-ttl-hours: ${TRAVEL_REVERSE_GEOCODE_CACHE_TTL_HOURS:24}
    summary-cache-ttl-seconds: ${TRAVEL_SUMMARY_CACHE_TTL_SECONDS:60}
    media-download-cache-ttl-seconds: ${TRAVEL_MEDIA_DOWNLOAD_CACHE_TTL_SECONDS:300}
    thumbnail-backfill-enabled: ${TRAVEL_THUMBNAIL_BACKFILL_ENABLED:true}
    thumbnail-backfill-fixed-delay-ms: ${TRAVEL_THUMBNAIL_BACKFILL_FIXED_DELAY_MS:900000}
    thumbnail-backfill-initial-delay-ms: ${TRAVEL_THUMBNAIL_BACKFILL_INITIAL_DELAY_MS:300000}
    thumbnail-backfill-page-size: ${TRAVEL_THUMBNAIL_BACKFILL_PAGE_SIZE:25}
    thumbnail-backfill-max-items-per-run: ${TRAVEL_THUMBNAIL_BACKFILL_MAX_ITEMS_PER_RUN:100}
    media-storage-path: ${TRAVEL_MEDIA_STORAGE_PATH:${user.dir}/uploads/travel-media}
    media-object-prefix: ${TRAVEL_MEDIA_OBJECT_PREFIX:travel-media}
    presigned-upload-enabled: ${TRAVEL_PRESIGNED_UPLOAD_ENABLED:false}
  ledger:
    ocr:
      enabled: ${LEDGER_OCR_ENABLED:false}
      base-url: ${LEDGER_OCR_BASE_URL:}
      workflow-url: ${LEDGER_OCR_WORKFLOW_URL:}
      api-key: ${LEDGER_OCR_API_KEY:}
      connect-timeout: ${LEDGER_OCR_CONNECT_TIMEOUT:3s}
      read-timeout: ${LEDGER_OCR_READ_TIMEOUT:90s}
      max-file-size: ${LEDGER_OCR_MAX_FILE_SIZE:10MB}
    ai:
      enabled: ${APP_LEDGER_AI_ENABLED:false}
      provider: ${APP_LEDGER_AI_PROVIDER:lmstudio}
      workflow-url: ${APP_LEDGER_AI_WORKFLOW_URL:}
      api-key: ${APP_LEDGER_AI_API_KEY:}
      api-key-header: ${APP_LEDGER_AI_API_KEY_HEADER:X-TravelLedger-AI-Key}
      model: ${APP_LEDGER_AI_MODEL:auto}
      lm-studio-base-url: ${APP_LEDGER_AI_LMSTUDIO_BASE_URL:http://172.18.240.1:1234}
      lm-studio-chat-path: ${APP_LEDGER_AI_LMSTUDIO_CHAT_PATH:/api/v1/chat}
      lm-studio-models-path: ${APP_LEDGER_AI_LMSTUDIO_MODELS_PATH:/api/v1/models}
      lm-studio-api-key: ${APP_LEDGER_AI_LMSTUDIO_API_KEY:}
      temperature: ${APP_LEDGER_AI_TEMPERATURE:0.2}
      max-tokens: ${APP_LEDGER_AI_MAX_TOKENS:2048}
      connect-timeout: ${APP_LEDGER_AI_CONNECT_TIMEOUT:3s}
      read-timeout: ${APP_LEDGER_AI_READ_TIMEOUT:120s}
      enforce-provider-url-allowlist: ${APP_LEDGER_AI_ENFORCE_PROVIDER_URL_ALLOWLIST:false}
      allowed-provider-hosts: "${APP_LEDGER_AI_ALLOWED_PROVIDER_HOSTS:localhost,127.0.0.1,::1,172.18.240.1}"
      history-retention-enabled: ${APP_LEDGER_AI_HISTORY_RETENTION_ENABLED:false}
      history-retention-days: ${APP_LEDGER_AI_HISTORY_RETENTION_DAYS:180}
      history-retention-cron: ${APP_LEDGER_AI_HISTORY_RETENTION_CRON:0 15 3 * * *}
      history-retention-zone: ${APP_LEDGER_AI_HISTORY_RETENTION_ZONE:Asia/Seoul}
  redis:
    cache:
      host: ${REDIS_CACHE_HOST:}
      port: ${REDIS_CACHE_PORT:6379}
      password: ${REDIS_CACHE_PASSWORD:}
      database: ${REDIS_CACHE_DATABASE:0}
      ssl: ${REDIS_CACHE_SSL:false}
    state:
      host: ${REDIS_STATE_HOST:}
      port: ${REDIS_STATE_PORT:6379}
      password: ${REDIS_STATE_PASSWORD:}
      database: ${REDIS_STATE_DATABASE:0}
      ssl: ${REDIS_STATE_SSL:false}
  family:
    media-storage-path: ${FAMILY_MEDIA_STORAGE_PATH:${user.dir}/uploads/family-media}
    media-object-prefix: ${FAMILY_MEDIA_OBJECT_PREFIX:family-media}
  seed:
    enabled: ${APP_SEED_ENABLED:false}
  support:
    attachment-storage-path: ${SUPPORT_ATTACHMENT_STORAGE_PATH:${user.dir}/uploads/support-inquiries}
  data-ops:
    backup-workdir: ${DATA_OPS_BACKUP_WORKDIR:/opt/calen-backup}
    backup-remote-name: ${DATA_OPS_BACKUP_REMOTE_NAME:db-backup}
    backup-remote-dir: ${DATA_OPS_BACKUP_REMOTE_DIR:calen-db-backups}
    minio-backup-remote-dir: ${DATA_OPS_MINIO_BACKUP_REMOTE_DIR:calen-minio-backups}
    rclone-config-path: ${DATA_OPS_RCLONE_CONFIG_PATH:/app/.config/rclone/rclone.conf}
    backup-zone: ${DATA_OPS_BACKUP_ZONE:Asia/Seoul}
    db-backup-enabled: ${DATA_OPS_DB_BACKUP_ENABLED:false}
    db-backup-cron: ${DATA_OPS_DB_BACKUP_CRON:0 0 0 * * *}
    minio-backup-enabled: ${DATA_OPS_MINIO_BACKUP_ENABLED:false}
    minio-backup-cron: ${DATA_OPS_MINIO_BACKUP_CRON:0 30 0 * * *}


