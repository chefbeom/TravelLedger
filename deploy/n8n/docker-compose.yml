services:
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "${N8N_BIND_ADDRESS:-127.0.0.1}:${N8N_PORT:-5678}:5678"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-Asia/Seoul}
      - TZ=${TZ:-Asia/Seoul}
      - N8N_HOST=${N8N_HOST:-127.0.0.1}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - WEBHOOK_URL=${WEBHOOK_URL:-http://127.0.0.1:5678/}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - LOCAL_LLM_BASE_URL=${LOCAL_LLM_BASE_URL}
      - LOCAL_LLM_API_KEY=${LOCAL_LLM_API_KEY}
      - LOCAL_LLM_MODEL=${LOCAL_LLM_MODEL:-gemma4:e12b}
      - TRAVELLEDGER_AI_WEBHOOK_KEY=${TRAVELLEDGER_AI_WEBHOOK_KEY}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./travelledger-ledger-ai-workflow.json:/tmp/travelledger-ledger-ai-workflow.json:ro

volumes:
  n8n_data: