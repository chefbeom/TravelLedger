global:
  resolve_timeout: 5m

route:
  receiver: ops-null
  group_by:
    - alertname
    - service
    - feature
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity="critical"
      receiver: ops-critical
      repeat_interval: 1h
    - matchers:
        - severity="warning"
      receiver: ops-warning
      repeat_interval: 4h

receivers:
  - name: ops-null
  - name: ops-critical
  - name: ops-warning

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal:
      - alertname
      - service
      - feature