global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: calen-backend
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - backend:8080
        labels:
          service: calen-backend
          role: app

  - job_name: node-exporter
    file_sd_configs:
      - files:
          - /etc/prometheus/file_sd/node-exporters.yml
        refresh_interval: 30s
