groups:
  - name: calen.platform.availability
    rules:
      - alert: CalenBackendDown
        expr: up{job="calen-backend"} == 0
        for: 2m
        labels:
          severity: critical
          service: calen-backend
        annotations:
          summary: Calen backend metrics endpoint is down
          description: Prometheus has not scraped backend:8080/actuator/prometheus for at least 2 minutes.
          runbook_url: docs/observability_alerts.md#alert-runbook-contract

      - alert: CalenNodeExporterDown
        expr: up{job="node-exporter"} == 0
        for: 5m
        labels:
          severity: warning
          service: node-exporter
        annotations:
          summary: Node exporter is down
          description: Node exporter target {{ $labels.instance }} has been unreachable for at least 5 minutes.
          runbook_url: docs/observability_alerts.md#alert-runbook-contract

  - name: calen.backend.slo
    rules:
      - alert: CalenBackendHigh5xxRate
        expr: |
          sum(rate(http_server_requests_seconds_count{job="calen-backend", status=~"5.."}[5m]))
          /
          clamp_min(sum(rate(http_server_requests_seconds_count{job="calen-backend"}[5m])), 0.001)
          > 0.05
        for: 5m
        labels:
          severity: critical
          service: calen-backend
        annotations:
          summary: Backend 5xx rate is above 5 percent
          description: More than 5 percent of backend HTTP requests have failed with 5xx responses for 5 minutes.
          runbook_url: docs/observability_alerts.md#alert-runbook-contract

      - alert: CalenBackendSlowP95
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(http_server_requests_seconds_bucket{job="calen-backend"}[5m]))
          ) > 2
        for: 10m
        labels:
          severity: warning
          service: calen-backend
        annotations:
          summary: Backend p95 latency is above 2 seconds
          description: Backend p95 request latency has stayed above 2 seconds for 10 minutes.
          runbook_url: docs/observability_alerts.md#alert-runbook-contract

      - alert: CalenHikariPoolNearlyExhausted
        expr: |
          max by (pool) (hikaricp_connections_active{job="calen-backend"})
          /
          clamp_min(max by (pool) (hikaricp_connections_max{job="calen-backend"}), 1)
          > 0.90
        for: 5m
        labels:
          severity: critical
          service: calen-backend
        annotations:
          summary: Backend DB connection pool is nearly exhausted
          description: Hikari pool {{ $labels.pool }} has used more than 90 percent of configured connections for 5 minutes.
          runbook_url: docs/observability_alerts.md#alert-runbook-contract

      - alert: CalenHikariPendingConnections
        expr: max by (pool) (hikaricp_connections_pending{job="calen-backend"}) > 0
        for: 2m
        labels:
          severity: critical
          service: calen-backend
        annotations:
          summary: Backend DB connection requests are waiting for pool capacity
          description: Hikari pool {{ $labels.pool }} has pending connection requests for at least 2 minutes.
          runbook_url: docs/observability_alerts.md#alert-runbook-contract

      - alert: CalenHikariConnectionTimeouts
        expr: sum by (pool) (increase(hikaricp_connections_timeout_total{job="calen-backend"}[5m])) > 0
        for: 0m
        labels:
          severity: critical
          service: calen-backend
        annotations:
          summary: Backend DB connection acquisition timed out
          description: Hikari pool {{ $labels.pool }} has reported one or more connection acquisition timeouts in the last 5 minutes.
          runbook_url: docs/observability_alerts.md#alert-runbook-contract

      - alert: CalenJvmHeapHigh
        expr: |
          sum(jvm_memory_used_bytes{job="calen-backend", area="heap"})
          /
          clamp_min(sum(jvm_memory_max_bytes{job="calen-backend", area="heap"}), 1)
          > 0.90
        for: 10m
        labels:
          severity: warning
          service: calen-backend
        annotations:
          summary: Backend JVM heap usage is high
          description: JVM heap usage has stayed above 90 percent for 10 minutes.
          runbook_url: docs/observability_alerts.md#alert-runbook-contract

  - name: calen.domain.ai_ocr_and_public_links
    rules:
      - alert: CalenLedgerAiHighFailureRate
        expr: |
          sum(rate(calen_ledger_ai_requests_total{job="calen-backend", status="failure"}[10m]))
          /
          clamp_min(sum(rate(calen_ledger_ai_requests_total{job="calen-backend"}[10m])), 0.001)
          > 0.10
        for: 10m
        labels:
          severity: warning
          service: calen-backend
          feature: ledger-ai
        annotations:
          summary: Ledger AI failure rate is above 10 percent
          description: Ledger AI remote analysis requests have failed more than 10 percent of the time for 10 minutes.
          runbook_url: docs/observability_alerts.md#alert-runbook-contract

      - alert: CalenLedgerAiSlowP95
        expr: |
          histogram_quantile(
            0.95,
            sum by (provider, le) (rate(calen_ledger_ai_request_seconds_bucket{job="calen-backend"}[10m]))
          ) > 90
        for: 10m
        labels:
          severity: warning
          service: calen-backend
          feature: ledger-ai
        annotations:
          summary: Ledger AI p95 latency is above 90 seconds
          description: Ledger AI provider {{ $labels.provider }} p95 request latency has stayed above 90 seconds for 10 minutes.
          runbook_url: docs/observability_alerts.md#alert-runbook-contract

      - alert: CalenLedgerOcrHighFailureRate
        expr: |
          sum(rate(calen_ledger_ocr_requests_total{job="calen-backend", status="failure"}[10m]))
          /
          clamp_min(sum(rate(calen_ledger_ocr_requests_total{job="calen-backend"}[10m])), 0.001)
          > 0.10
        for: 10m
        labels:
          severity: warning
          service: calen-backend
          feature: ledger-ocr
        annotations:
          summary: Ledger OCR failure rate is above 10 percent
          description: Ledger OCR analysis requests have failed more than 10 percent of the time for 10 minutes.
          runbook_url: docs/observability_alerts.md#alert-runbook-contract

      - alert: CalenLedgerOcrSlowP95
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(calen_ledger_ocr_request_seconds_bucket{job="calen-backend"}[10m]))
          ) > 60
        for: 10m
        labels:
          severity: warning
          service: calen-backend
          feature: ledger-ocr
        annotations:
          summary: Ledger OCR p95 latency is above 60 seconds
          description: Ledger OCR p95 request latency has stayed above 60 seconds for 10 minutes.
          runbook_url: docs/observability_alerts.md#alert-runbook-contract

      - alert: CalenPublicDownloadLinkInvalidSpike
        expr: |
          sum(rate(calen_public_download_link_requests_total{job="calen-backend", status=~"invalid|revoked|expired|limit_reached|invalid_item|trashed"}[10m]))
          > 0.05
        for: 10m
        labels:
          severity: warning
          service: calen-backend
          feature: public-download-link
        annotations:
          summary: Public download link invalid/unavailable attempts increased
          description: Public download link invalid, revoked, expired, limit-reached, invalid-item, or trashed-item attempts are above 3 per minute for 10 minutes.
          runbook_url: docs/observability_alerts.md#alert-runbook-contract

  - name: calen.domain.external_workflows
    rules:
      - alert: CalenExternalWorkflowHighFailureRate
        expr: |
          sum(rate(calen_external_workflow_requests_total{job="calen-backend", status="failure"}[10m]))
          /
          clamp_min(sum(rate(calen_external_workflow_requests_total{job="calen-backend"}[10m])), 0.001)
          > 0.10
        for: 10m
        labels:
          severity: warning
          service: calen-backend
          feature: external-workflow
        annotations:
          summary: External workflow/client failure rate is above 10 percent
          description: External workflow/client requests have failed more than 10 percent of the time for 10 minutes.
          runbook_url: docs/observability_alerts.md#alert-runbook-contract

      - alert: CalenExternalWorkflowSlowP95
        expr: |
          histogram_quantile(
            0.95,
            sum by (workflow, le) (rate(calen_external_workflow_request_seconds_bucket{job="calen-backend"}[10m]))
          ) > 30
        for: 10m
        labels:
          severity: warning
          service: calen-backend
          feature: external-workflow
        annotations:
          summary: External workflow/client p95 latency is above 30 seconds
          description: External workflow/client {{ $labels.workflow }} p95 latency has stayed above 30 seconds for 10 minutes.
          runbook_url: docs/observability_alerts.md#alert-runbook-contract
  - name: calen.domain.data_ops
    rules:
      - alert: CalenDataOpsBackupFailure
        expr: |
          sum by (type) (increase(calen_data_ops_backup_runs_total{job="calen-backend", status="failure"}[30m])) > 0
        for: 0m
        labels:
          severity: critical
          service: calen-backend
          feature: data-ops-backup
        annotations:
          summary: Data operations backup failed
          description: Data operations backup type {{ $labels.type }} has failed within the last 30 minutes.
          runbook_url: docs/observability_alerts.md#alert-runbook-contract

      - alert: CalenDataOpsBackupStale
        expr: |
          time() - max by (type) (calen_data_ops_backup_last_success_timestamp{job="calen-backend"}) > 93600
        for: 15m
        labels:
          severity: warning
          service: calen-backend
          feature: data-ops-backup
        annotations:
          summary: Data operations backup has no recent success
          description: Data operations backup type {{ $labels.type }} has not recorded a successful run within 26 hours.
          runbook_url: docs/observability_alerts.md#alert-runbook-contract

      - alert: CalenLedgerAiHistoryRetentionFailure
        expr: |
          sum(increase(calen_ledger_ai_history_retention_runs_total{job="calen-backend", status="failure"}[30m])) > 0
        for: 0m
        labels:
          severity: warning
          service: calen-backend
          feature: ledger-ai-retention
        annotations:
          summary: Ledger AI history retention cleanup failed
          description: Ledger AI history retention cleanup has failed within the last 30 minutes. Check backend scheduler logs before relying on retention guarantees.
          runbook_url: docs/observability_alerts.md#alert-runbook-contract

  - name: calen.domain.redis
    rules:
      - alert: CalenRedisConnectionUnavailable
        expr: calen_redis_connection_available{job="calen-backend", role!="state"} == 0
        for: 5m
        labels:
          severity: warning
          service: calen-backend
          feature: redis-cache
        annotations:
          summary: Cache Redis connection is unavailable
          description: Redis role {{ $labels.role }} has been unavailable from the backend for at least 5 minutes.
          runbook_url: docs/observability_alerts.md#alert-runbook-contract

      - alert: CalenRedisStateConnectionUnavailable
        expr: calen_redis_connection_available{job="calen-backend", role="state"} == 0
        for: 2m
        labels:
          severity: critical
          service: calen-backend
          feature: redis-state
        annotations:
          summary: State Redis connection is unavailable
          description: State Redis has been unavailable from the backend for at least 2 minutes; session state, throttling, locks, and backup coordination may be unsafe.
          runbook_url: docs/observability_alerts.md#alert-runbook-contract

  - name: calen.domain.minio
    rules:
      - alert: CalenMinioStorageHighUsage
        expr: |
          (
            calen_minio_storage_used_bytes{job="calen-backend"}
            /
            clamp_min(calen_minio_storage_capacity_bytes{job="calen-backend"}, 1)
          ) > 0.85
          and on (instance, bucket)
          calen_minio_storage_capacity_bytes{job="calen-backend"} > 0
        for: 15m
        labels:
          severity: warning
          service: calen-backend
          feature: minio-storage
        annotations:
          summary: MinIO storage usage is above 85 percent
          description: MinIO bucket {{ $labels.bucket }} has used more than 85 percent of configured capacity for 15 minutes.
          runbook_url: docs/observability_alerts.md#alert-runbook-contract

  - name: calen.host.capacity
    rules:
      - alert: CalenHostDiskNearlyFull
        expr: |
          node_filesystem_avail_bytes{job="node-exporter", fstype!~"tmpfs|overlay|squashfs|proc|sysfs"}
          /
          node_filesystem_size_bytes{job="node-exporter", fstype!~"tmpfs|overlay|squashfs|proc|sysfs"}
          < 0.10
        for: 10m
        labels:
          severity: critical
          service: node-exporter
        annotations:
          summary: Host filesystem has less than 10 percent free space
          description: Filesystem {{ $labels.mountpoint }} on {{ $labels.server }} has less than 10 percent free space for 10 minutes.
          runbook_url: docs/observability_alerts.md#alert-runbook-contract
