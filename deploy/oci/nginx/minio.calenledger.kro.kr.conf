server {
    listen 80;
    listen [::]:80;
    server_name minio.calenledger.kro.kr;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name minio.calenledger.kro.kr;

    ssl_certificate /etc/nginx/ssl/minio.calenledger.kro.kr/fullchain.crt;
    ssl_certificate_key /etc/nginx/ssl/minio.calenledger.kro.kr/private.key;

    client_max_body_size 2g;
    ignore_invalid_headers off;
    proxy_buffering off;
    proxy_request_buffering off;

    add_header Access-Control-Allow-Origin "https://www.innoutdrive.space" always;
    add_header Access-Control-Allow-Methods "GET, PUT, POST, HEAD, OPTIONS" always;
    add_header Access-Control-Allow-Headers "*" always;
    add_header Access-Control-Expose-Headers "ETag" always;

    location / {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "https://www.innoutdrive.space" always;
            add_header Access-Control-Allow-Methods "GET, PUT, POST, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "*" always;
            add_header Access-Control-Max-Age 3000 always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
    }
}
