name: ${COMPOSE_PROJECT_NAME:-calen-app}

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Seoul}
      DB_URL: ${DB_URL:-jdbc:mariadb://10.0.0.2:3306/calen?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Seoul}
      DB_DRIVER: ${DB_DRIVER:-org.mariadb.jdbc.Driver}
      DB_ID: ${DB_USER:-calen}
      DB_PASS: ${DB_PASSWORD:-calen1234}
      JWT_KEY: ${JWT_KEY:-change-me-remember-me-key}
      JWT_EXPIRE: ${JWT_EXPIRE:-300000000}
      APP_SEED_ENABLED: ${APP_SEED_ENABLED:-false}
      JPA_SHOW_SQL: ${JPA_SHOW_SQL:-false}
      JPA_FORMAT_SQL: ${JPA_FORMAT_SQL:-false}
      DB_MIGRATION_ENABLED: ${DB_MIGRATION_ENABLED:-false}
      DB_MIGRATION_BASELINE_ON_MIGRATE: ${DB_MIGRATION_BASELINE_ON_MIGRATE:-true}
      DB_MIGRATION_BASELINE_VERSION: ${DB_MIGRATION_BASELINE_VERSION:-0}
      DB_MIGRATION_VALIDATE_ON_MIGRATE: ${DB_MIGRATION_VALIDATE_ON_MIGRATE:-true}
      H2_CONSOLE_ENABLED: ${H2_CONSOLE_ENABLED:-false}
      MINIO_API: ${MINIO_API:-http://10.0.0.2:9000}
      MINIO_PUBLIC_API: ${MINIO_PUBLIC_API:-}
      MINIO_NAME: ${MINIO_NAME:-minioadmin}
      MINIO_SECRET: ${MINIO_SECRET:-change-me-minio-password}
      MINIO_CLOUD_BUCKET: ${MINIO_CLOUD_BUCKET:-budgetjourneybucket}
      MINIO_WORKSPACE_BUCKET: ${MINIO_WORKSPACE_BUCKET:-calen-workspace}
      MINIO_PRESIGNED_URL_EXPIRY_SECONDS: ${MINIO_PRESIGNED_URL_EXPIRY_SECONDS:-6000}
      MINIO_STORAGE_CAPACITY_BYTES: ${MINIO_STORAGE_CAPACITY_BYTES:-0}
      TRAVEL_EXCHANGE_RATE_BASE_URL: ${TRAVEL_EXCHANGE_RATE_BASE_URL:-https://api.frankfurter.dev/v1}
      TRAVEL_EXCHANGE_RATE_CACHE_MINUTES: ${TRAVEL_EXCHANGE_RATE_CACHE_MINUTES:-30}
      TRAVEL_REVERSE_GEOCODE_BASE_URL: ${TRAVEL_REVERSE_GEOCODE_BASE_URL:-https://nominatim.openstreetmap.org/reverse}
      TRAVEL_REVERSE_GEOCODE_USER_AGENT: ${TRAVEL_REVERSE_GEOCODE_USER_AGENT:-TravelLedger/1.0 (+https://www.innoutdrive.space)}
      TRAVEL_REVERSE_GEOCODE_REQUEST_MIN_INTERVAL_MS: ${TRAVEL_REVERSE_GEOCODE_REQUEST_MIN_INTERVAL_MS:-1200}
      TRAVEL_REVERSE_GEOCODE_CACHE_TTL_HOURS: ${TRAVEL_REVERSE_GEOCODE_CACHE_TTL_HOURS:-24}
      TRAVEL_SUMMARY_CACHE_TTL_SECONDS: ${TRAVEL_SUMMARY_CACHE_TTL_SECONDS:-60}
      TRAVEL_MEDIA_DOWNLOAD_CACHE_TTL_SECONDS: ${TRAVEL_MEDIA_DOWNLOAD_CACHE_TTL_SECONDS:-300}
      TRAVEL_THUMBNAIL_BACKFILL_ENABLED: ${TRAVEL_THUMBNAIL_BACKFILL_ENABLED:-true}
      TRAVEL_THUMBNAIL_BACKFILL_FIXED_DELAY_MS: ${TRAVEL_THUMBNAIL_BACKFILL_FIXED_DELAY_MS:-900000}
      TRAVEL_THUMBNAIL_BACKFILL_INITIAL_DELAY_MS: ${TRAVEL_THUMBNAIL_BACKFILL_INITIAL_DELAY_MS:-300000}
      TRAVEL_THUMBNAIL_BACKFILL_PAGE_SIZE: ${TRAVEL_THUMBNAIL_BACKFILL_PAGE_SIZE:-25}
      TRAVEL_THUMBNAIL_BACKFILL_MAX_ITEMS_PER_RUN: ${TRAVEL_THUMBNAIL_BACKFILL_MAX_ITEMS_PER_RUN:-100}
      TRAVEL_PRESIGNED_UPLOAD_ENABLED: ${TRAVEL_PRESIGNED_UPLOAD_ENABLED:-false}
      LEDGER_OCR_ENABLED: "true"
      LEDGER_OCR_WORKFLOW_URL: ${LEDGER_OCR_WORKFLOW_URL:-}
      LEDGER_OCR_BASE_URL: ${LEDGER_OCR_BASE_URL:-}
      LEDGER_OCR_API_KEY: ${LEDGER_OCR_API_KEY:-}
      LEDGER_OCR_CONNECT_TIMEOUT: ${LEDGER_OCR_CONNECT_TIMEOUT:-3s}
      LEDGER_OCR_READ_TIMEOUT: ${LEDGER_OCR_READ_TIMEOUT:-90s}
      LEDGER_OCR_MAX_FILE_SIZE: ${LEDGER_OCR_MAX_FILE_SIZE:-10MB}
      APP_LEDGER_AI_ENABLED: ${APP_LEDGER_AI_ENABLED:-false}
      APP_LEDGER_AI_PROVIDER: ${APP_LEDGER_AI_PROVIDER:-lmstudio}
      APP_LEDGER_AI_MODEL: ${APP_LEDGER_AI_MODEL:-auto}
      APP_LEDGER_AI_LMSTUDIO_BASE_URL: ${APP_LEDGER_AI_LMSTUDIO_BASE_URL:-http://100.92.170.22:1234}
      APP_LEDGER_AI_LMSTUDIO_CHAT_PATH: ${APP_LEDGER_AI_LMSTUDIO_CHAT_PATH:-/v1/chat/completions}
      APP_LEDGER_AI_LMSTUDIO_MODELS_PATH: ${APP_LEDGER_AI_LMSTUDIO_MODELS_PATH:-/v1/models}
      APP_LEDGER_AI_LMSTUDIO_API_KEY: ${APP_LEDGER_AI_LMSTUDIO_API_KEY:-}
      APP_LEDGER_AI_TEMPERATURE: ${APP_LEDGER_AI_TEMPERATURE:-0.2}
      APP_LEDGER_AI_MAX_TOKENS: ${APP_LEDGER_AI_MAX_TOKENS:-2048}
      APP_LEDGER_AI_CONNECT_TIMEOUT: ${APP_LEDGER_AI_CONNECT_TIMEOUT:-3s}
      APP_LEDGER_AI_READ_TIMEOUT: ${APP_LEDGER_AI_READ_TIMEOUT:-120s}
      APP_LEDGER_AI_ENFORCE_PROVIDER_URL_ALLOWLIST: ${APP_LEDGER_AI_ENFORCE_PROVIDER_URL_ALLOWLIST:-true}
      APP_LEDGER_AI_ALLOWED_PROVIDER_HOSTS: ${APP_LEDGER_AI_ALLOWED_PROVIDER_HOSTS:-100.92.170.22,127.0.0.1,localhost}
      APP_LEDGER_AI_WORKFLOW_URL: ${APP_LEDGER_AI_WORKFLOW_URL:-}
      APP_LEDGER_AI_API_KEY: ${APP_LEDGER_AI_API_KEY:-}
      APP_LEDGER_AI_API_KEY_HEADER: ${APP_LEDGER_AI_API_KEY_HEADER:-X-TravelLedger-AI-Key}
      TRAVEL_MEDIA_STORAGE_PATH: ${TRAVEL_MEDIA_STORAGE_PATH:-/app/uploads/travel-media}
      TRAVEL_MEDIA_OBJECT_PREFIX: ${TRAVEL_MEDIA_OBJECT_PREFIX:-travel-media}
      FAMILY_MEDIA_STORAGE_PATH: ${FAMILY_MEDIA_STORAGE_PATH:-/app/uploads/family-media}
      FAMILY_MEDIA_OBJECT_PREFIX: ${FAMILY_MEDIA_OBJECT_PREFIX:-family-media}
      SUPPORT_ATTACHMENT_STORAGE_PATH: ${SUPPORT_ATTACHMENT_STORAGE_PATH:-/app/uploads/support-inquiries}
      REDIS_CACHE_HOST: ${REDIS_CACHE_HOST:-}
      REDIS_CACHE_PORT: ${REDIS_CACHE_PORT:-6379}
      REDIS_CACHE_PASSWORD: ${REDIS_CACHE_PASSWORD:-}
      REDIS_CACHE_DATABASE: ${REDIS_CACHE_DATABASE:-0}
      REDIS_CACHE_SSL: ${REDIS_CACHE_SSL:-false}
      REDIS_STATE_HOST: ${REDIS_STATE_HOST:-}
      REDIS_STATE_PORT: ${REDIS_STATE_PORT:-6379}
      REDIS_STATE_PASSWORD: ${REDIS_STATE_PASSWORD:-}
      REDIS_STATE_DATABASE: ${REDIS_STATE_DATABASE:-0}
      REDIS_STATE_SSL: ${REDIS_STATE_SSL:-false}
      DATA_OPS_BACKUP_WORKDIR: ${DATA_OPS_BACKUP_WORKDIR:-/opt/calen-backup}
      DATA_OPS_BACKUP_REMOTE_NAME: ${DATA_OPS_BACKUP_REMOTE_NAME:-db-backup}
      DATA_OPS_BACKUP_REMOTE_DIR: ${DATA_OPS_BACKUP_REMOTE_DIR:-calen-db-backups}
      DATA_OPS_MINIO_BACKUP_REMOTE_DIR: ${DATA_OPS_MINIO_BACKUP_REMOTE_DIR:-calen-minio-backups}
      DATA_OPS_BACKUP_ZONE: ${DATA_OPS_BACKUP_ZONE:-Asia/Seoul}
      DATA_OPS_DB_BACKUP_ENABLED: ${DATA_OPS_DB_BACKUP_ENABLED:-true}
      DATA_OPS_DB_BACKUP_CRON: ${DATA_OPS_DB_BACKUP_CRON:-0 0 0 * * *}
      DATA_OPS_MINIO_BACKUP_ENABLED: ${DATA_OPS_MINIO_BACKUP_ENABLED:-true}
      DATA_OPS_MINIO_BACKUP_CRON: ${DATA_OPS_MINIO_BACKUP_CRON:-0 30 0 * * *}
      DATA_OPS_RCLONE_CONFIG_PATH: ${DATA_OPS_RCLONE_CONFIG_PATH:-/app/.config/rclone/rclone.conf}
      DATA_OPS_RCLONE_CONFIG_HOST_CONTAINER_PATH: /app/.config/rclone-host
    ports:
      - "${OCI_BACKEND_BIND_HOST:-127.0.0.1}:${OCI_BACKEND_BIND_PORT:-8080}:8080"
    volumes:
      - backend-uploads:/app/uploads
      - ${DATA_OPS_BACKUP_HOST_PATH:-/opt/calen-backup}:/opt/calen-backup
      - ${DATA_OPS_RCLONE_CONFIG_HOST_PATH:-/home/ubuntu/.config/rclone}:/app/.config/rclone-host:ro
    networks:
      - calen-app
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health/readiness >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      BACKEND_INTERNAL_HOST: ${BACKEND_INTERNAL_HOST:-backend}
      BACKEND_INTERNAL_PORT: ${BACKEND_INTERNAL_PORT:-8080}
    ports:
      - "${OCI_FRONTEND_BIND_HOST:-127.0.0.1}:${OCI_FRONTEND_BIND_PORT:-8081}:80"
    networks:
      - calen-app
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  backend-uploads:

networks:
  calen-app:
    driver: bridge

