name: ${COMPOSE_PROJECT_NAME:-calen-data}

services:
  mariadb:
    image: mariadb:11.4
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      TZ: ${TZ:-Asia/Seoul}
      MARIADB_DATABASE: ${DB_NAME:-calen}
      MARIADB_USER: ${DB_USER:-calen}
      MARIADB_PASSWORD: ${DB_PASSWORD:-calen1234}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change-me-db-root-password}
    volumes:
      - mariadb-data:/var/lib/mysql
    ports:
      - "${DATA_DB_BIND_HOST:-0.0.0.0}:${DATA_DB_BIND_PORT:-3306}:3306"
    networks:
      - calen-data
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p$${MARIADB_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      TZ: ${TZ:-Asia/Seoul}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-minio-password}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_CONSOLE_EXTERNAL_URL:-http://127.0.0.1:9001}
    volumes:
      - minio-data:/data
    ports:
      - "${DATA_MINIO_API_BIND_HOST:-0.0.0.0}:${DATA_MINIO_API_BIND_PORT:-9000}:9000"
      - "${DATA_MINIO_CONSOLE_BIND_HOST:-0.0.0.0}:${DATA_MINIO_CONSOLE_BIND_PORT:-9001}:9001"
    networks:
      - calen-data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:9000/minio/health/live || curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  minio-init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      minio:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local ${MINIO_API_INTERNAL_URL:-http://minio:9000} ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-change-me-minio-password}; do
          echo "Waiting for MinIO..."
          sleep 2
        done
        mc mb --ignore-existing local/${MINIO_CLOUD_BUCKET:-budgetjourneybucket}
    networks:
      - calen-data

volumes:
  mariadb-data:
  minio-data:

networks:
  calen-data:
    driver: bridge
